name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skermtime/web lint
      - run: pnpm --filter @skermtime/web test
      - run: pnpm --filter @skermtime/web build
        env:
          # Build-time placeholders; real values come from Vercel env at deploy.
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: build-placeholder

  agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet build apps/agent/Skermtime.Agent.csproj -c Release
